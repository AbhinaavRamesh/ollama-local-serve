# Smart Model Router Configuration
# Set ROUTER_CONFIG_PATH=router_config.yaml and ROUTER_ENABLED=true to activate

enabled: true
default_model: "llama3.2"
fallback_model: "llama3.2"
strategy: "priority"  # "priority" (first available) or "round-robin"

rules:
  - task_type: "code"
    models: ["deepseek-coder-v2", "codellama", "qwen2.5-coder"]
    keywords: ["code", "function", "bug", "implement", "debug", "refactor", "python", "javascript", "typescript", "class", "method", "API", "endpoint", "compile", "syntax"]

  - task_type: "reasoning"
    models: ["deepseek-r1", "qwen2.5", "llama3.2"]
    keywords: ["think", "analyze", "reason", "explain why", "step by step", "solve", "calculate", "proof", "logic", "compare"]

  - task_type: "creative"
    models: ["llama3.2", "mistral", "gemma2"]
    keywords: ["write", "story", "creative", "poem", "essay", "blog", "narrative", "fiction", "draft"]

  - task_type: "chat"
    models: ["llama3.2", "gemma2", "mistral"]
    keywords: ["hello", "help", "tell me", "what is", "how do", "explain", "summarize"]
